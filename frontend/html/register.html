<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TaskZen</title>
    
    <link rel="stylesheet" href="../css/authentication.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="mb-6">
        <a href="home.html">
            <img src="../../assets/images/taskzenLOGO.jpg" alt="TaskZen" class="h-12 rounded-lg shadow-sm">
        </a>
    </div>

    <div class="auth-container w-full max-w-md">
        <div class="auth-card bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h2 class="text-3xl font-bold text-center text-gray-900 mb-2">
                Create Account
            </h2>
            <p class="text-center text-gray-500 mb-8 text-sm">Join TaskZen and start organizing today.</p>
            
            <form id="registerForm" action="login.html" method="GET" class="space-y-5">
                <div>
                    <label for="fullname" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" 
                           id="fullname"
                           name="fullname"
                           placeholder="John Doe" 
                           class="auth-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-violet-500 outline-none transition-all" 
                           required>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" 
                           id="email"
                           name="email"
                           placeholder="name@example.com" 
                           class="auth-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-violet-500 outline-none transition-all" 
                           required>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" 
                           id="password"
                           name="password"
                           placeholder="Create a password" 
                           class="auth-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-violet-500 outline-none transition-all" 
                           required>
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                    <input type="password" 
                           id="confirm-password"
                           name="confirm-password"
                           placeholder="Repeat your password" 
                           class="auth-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-violet-500 outline-none transition-all" 
                           required>
                </div>

                <div class="flex items-start">
                    <input type="checkbox" id="terms" class="mt-1 w-4 h-4 text-violet-600 border-gray-300 rounded focus:ring-violet-500" required>
                    <label for="terms" class="ml-2 text-xs text-gray-600">
                        I agree to the <a href="#" class="text-violet-700 hover:underline">Terms of Service</a> and <a href="#" class="text-violet-700 hover:underline">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" class="w-full bg-violet-700 text-white py-3 rounded-lg font-bold hover:bg-violet-800 transition-all shadow-md active:scale-[0.98]">
                    Create Free Account
                </button>

                <p class="mt-6 text-center text-sm text-gray-600">
                    Already have an account? 
                    <a href="login.html" class="text-violet-700 font-bold hover:underline">Login here</a>
                </p>
            </form>
        </div>

        <p class="text-center mt-6">
            <a href="home.html" class="text-gray-400 hover:text-gray-600 text-sm flex items-center justify-center gap-1">
                <span>←</span> Back to Home
            </a>
        </p>
    </div>

</body>
</html>
