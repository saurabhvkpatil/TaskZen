<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskZen</title>
    
    <link rel="stylesheet" href="../css/authentication.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="mb-8">
        <a href="home.html" class="flex items-center gap-2">
            <img src="../../assets/images/taskzenLOGO.jpg" alt="TaskZen" class="h-12 rounded-lg shadow-sm">
        </a>
    </div>

    <div class="auth-container w-full max-w-md">
        <div class="auth-card bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h2 class="text-3xl font-bold text-center text-gray-900 mb-2">
                Welcome Back
            </h2>
            <p class="text-center text-gray-500 mb-8 text-sm">Please enter your details to sign in.</p>
            
            <form id="loginForm" action="usertask.html" method="GET" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" 
                           id="email"
                           name="email"
                           placeholder="Enter your email" 
                           class="auth-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-violet-500 outline-none transition-all" 
                           required>
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <a href="#" class="text-xs text-violet-700 hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" 
                           id="password"
                           name="password"
                           placeholder="Enter password" 
                           class="auth-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-violet-500 outline-none transition-all" 
                           required>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-violet-600 border-gray-300 rounded focus:ring-violet-500">
                    <label for="remember" class="ml-2 text-sm text-gray-600">Remember me</label>
                </div>

                <button type="submit" class="w-full bg-violet-700 text-white py-3 rounded-lg font-bold hover:bg-violet-800 transition-all shadow-md active:scale-[0.98]">
                    Login
                </button>

                <p class="mt-6 text-center text-sm text-gray-600">
                    Don’t have an account? 
                    <a href="register.html" class="text-violet-700 font-bold hover:underline">Register now</a>
                </p>
            </form>
        </div>

        <p class="text-center mt-8">
            <a href="home.html" class="text-gray-400 hover:text-gray-600 text-sm flex items-center justify-center gap-1">
                <span>←</span> Back to Home
            </a>
        </p>
    </div>

</body>
</html>
