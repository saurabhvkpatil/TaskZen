<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskZen | Login</title>
    <link rel="icon" type="image/png" href="../images/taskzenICON.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/authentication.css">
</head>

<body class="dashboard-main">
    <!-- NAVBAR -->
    <header class="sticky-top navbar navbar-dark bg-purple px-3">
        <!-- menu icon (mobile + tablet only) -->
        <a class="navbar-brand" href="#">
            <img src="../images/LOGOwhite.png" height="45">
        </a>

        <div>
            <h1 style="color: white;">Hey, Saurabh</h1>
        </div>
    </header>
    <main>
        <div class="container d-flex justify-content-center align-items-center vh-100">

            <div class="auth-container">

                <h2 class="text-center mb-4">Login</h2>

                <form>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Login</button>

                    <p class="switch mt-3 text-center">
                        Don’t have an account?
                        <a href="../html/register.html">Register</a>
                    </p>

                </form>

            </div>

        </div>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer>
        <div class="foot">
            <p>Developed by students of iTprenure</p>
            <p>© 2026 TaskZen | All Rights Reserved</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
