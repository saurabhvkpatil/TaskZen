<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskZen | Taskboard</title>
    <link rel="icon" type="image/png" href="../images/taskzenICON.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/details.css">
</head>

<body class="dashboard-main">
    <!-- NAVBAR -->
    <header class="sticky-top navbar navbar-dark bg-purple px-3">
        <!-- menu icon (mobile + tablet only) -->
        <a class="navbar-brand" href="#">
            <img src="../images/LOGOwhite.png" height="45">
        </a>

        <div>
            <h1 style="color: white;">Hey, Saurabh</h1>
        </div>
    </header>

    <main>
        <div class="form-container">

            <div class="form-card">

                <h2>Task Details</h2>

                <form>

                    <label>Title:</label>
                    <input type="text" value="Enter your Title" readonly>

                    <label>Description:</label>
                    <textarea rows="3" readonly>This is description area...</textarea>

                    <!-- RADIO SECTION -->
                    <div class="radio-section">

                        <div class="radio-column">

                            <label class="section-title">Priority:</label>

                            <div class="radio-group">
                                <label class="radio-item"><input type="radio" name="priority"> High</label>
                                <label class="radio-item"><input type="radio" name="priority"> Medium</label>
                                <label class="radio-item"><input type="radio" name="priority"> Low</label>
                            </div>

                        </div>

                        <div class="radio-column">

                            <label class="section-title">Status:</label>

                            <div class="radio-group">
                                <label class="radio-item"><input type="radio" name="status"> Pending</label>
                                <label class="radio-item"><input type="radio" name="status"> In Progress</label>
                            </div>

                        </div>

                    </div>

                    <label>Due Date:</label>
                    <input type="date" value="2026-03-10" readonly>

                    <label>Created Date:</label>
                    <input type="date" value="2026-03-01" readonly>

                    <label>Updated Date:</label>
                    <input type="date" value="2026-03-07" readonly>


                    <div class="form-buttons">

                        <a href="../html/edit.html" class="btn-edit">Edit</a>

                        <button type="button" class="btn-delete">Delete</button>

                        <button type="button" class="btn-complete">Mark Done</button>

                        <a href="../html/taskboard.html" class="btn-back">Back</a>

                    </div>

                </form>

            </div>
        </div>
    </main>


    <!-- ================= FOOTER ================= -->
    <footer>
        <div class="foot">
            <p>Developed by students of iTprenure</p>
            <p>© 2026 TaskZen | All Rights Reserved</p>
        </div>
    </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
