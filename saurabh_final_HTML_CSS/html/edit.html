<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskZen | Taskboard</title>
    <link rel="icon" type="image/png" href="../images/taskzenICON.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/addedit.css">
    <style></style>
</head>

<body class="dashboard-main">
    <!-- NAVBAR -->
    <header class="sticky-top navbar navbar-dark bg-purple px-3">
        <!-- menu icon (mobile + tablet only) -->
        <a class="navbar-brand" href="#">
            <img src="../images/LOGOwhite.png" height="45">
        </a>

        <div>
            <h1 style="color: white;">Hey, Saurabh</h1>
        </div>
    </header>

    <main>
        <div class="form-container">

            <!-- FORM CARD -->
            <div class="form-card">
                <h2>Edit Task</h2>

                <form action="#" method="post">
                    <label for="title">Task Title</label>
                    <input type="text" id="title" name="title" value="Fix login bug" required>

                    <label for="desc">Description</label>
                    <textarea id="desc" name="desc" rows="3">Update the authentication logic.</textarea>

                    <label for="priority">Priority</label>
                    <select id="priority" name="priority" required>
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>

                    <label for="due">Due Date</label>
                    <input type="date" id="due" name="due" required>

                    <div class="form-buttons">
                        <!-- <button type="submit" class="btn-primary">Update</button> -->
                        <a href="../html/detail.html" class="btn-edit">Edit</a>
                        <a href="../html/detail.html" class="btn-cancle">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>


    <!-- ================= FOOTER ================= -->
    <footer>
        <div class="foot">
            <p>Developed by students of iTprenure</p>
            <p>© 2026 TaskZen | All Rights Reserved</p>
        </div>
    </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
